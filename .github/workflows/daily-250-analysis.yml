name: Daily 250 NSE Stocks Analysis

on:
  schedule:
    - cron: '45 10 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: pip install yfinance scikit-learn pandas numpy
      
      - name: Run analysis
        run: python indian_stock_analyzer_250.py
        timeout-minutes: 120
      
      - name: Commit results
        run: |
          git config --local user.email "stock-bot@github.com"
          git config --local user.name "Stock Bot"
          git add data/daily_analysis/
          git commit -m "🔍 Daily analysis - $(date '+%Y-%m-%d')" || true
          git push
